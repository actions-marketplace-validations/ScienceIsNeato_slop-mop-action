name: "Slop-Mop"
author: "ScienceIsNeato"
description: "Run Slop-Mop swab or scour in GitHub Actions with hull grade, SARIF, JSON, and job-summary output."

branding:
  icon: "shield"
  color: "gray-dark"

inputs:
  command:
    description: "Slop-Mop validation command to run. Supported values: swab, scour."
    required: false
    default: "scour"

  args:
    description: "Extra arguments passed to sm before the action-managed output flags."
    required: false
    default: "--no-auto-fix"

  python-version:
    description: "Python version used to install and run Slop-Mop."
    required: false
    default: "3.12"

  install-extra:
    description: "Slop-Mop PyPI extra to install."
    required: false
    default: "all"

  slopmop-version:
    description: "Slop-Mop version specifier, such as ==2.6.0 or >=2.5.0. Pinned by default so the install cache is deterministic; the Slop-Mop release workflow bumps this on each release. Override to track a different version."
    required: false
    default: "==2.5.0"

  results-file:
    description: "Path where Slop-Mop JSON results should be written."
    required: false
    default: "slopmop-results.json"

  sarif-file:
    description: "Path where Slop-Mop SARIF should be written."
    required: false
    default: "slopmop.sarif"

  upload-sarif:
    description: "Upload SARIF to GitHub Code Scanning."
    required: false
    default: "true"

  sarif-category:
    description: "Code Scanning category for uploaded SARIF."
    required: false
    default: "slopmop"

  strict-sarif-upload:
    description: "Fail the action if SARIF upload fails."
    required: false
    default: "false"

  fail-on-failure:
    description: "Fail the action when sm exits non-zero."
    required: false
    default: "true"

  minimum-grade:
    description: >-
      Fail the action when the hull grade is worse than this letter
      (A+, A, B, C, D, F). Empty disables grade enforcement. A non-empty
      value that isn't one of those letters fails the action as a
      misconfiguration. N/A (dry-dock, repo not initialized) never fails
      the threshold.
    required: false
    default: ""

outputs:
  result:
    description: "passed or failed, based on the sm exit code."
    value: ${{ steps.run.outputs.result }}

  exit_code:
    description: "Raw sm exit code."
    value: ${{ steps.run.outputs.exit_code }}

  results_file:
    description: "JSON results file path."
    value: ${{ steps.run.outputs.results_file }}

  sarif_file:
    description: "SARIF file path."
    value: ${{ steps.run.outputs.sarif_file }}

  grade:
    description: "Hull grade letter: A+, A, B, C, D, F, or N/A. Empty when slopmop did not emit a grade."
    value: ${{ steps.run.outputs.grade }}

  hull:
    description: "Hull condition name: shipshape, seaworthy, serviceable, weathered, fouled, scuttled, or dry-dock."
    value: ${{ steps.run.outputs.hull }}

  failing:
    description: "Number of failing gates counted toward the grade."
    value: ${{ steps.run.outputs.failing }}

  warned:
    description: "Number of warned gates."
    value: ${{ steps.run.outputs.warned }}

  provisional:
    description: "true when operational skips (missing tool, fail-fast, time budget) may have hidden failing gates."
    value: ${{ steps.run.outputs.provisional }}

  hull_grade_json:
    description: "Compact hull_grade JSON object, when emitted by Slop-Mop."
    value: ${{ steps.run.outputs.hull_grade_json }}

  grade_met:
    description: "true/false when minimum-grade is set and the grade is comparable; empty otherwise."
    value: ${{ steps.run.outputs.grade_met }}

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    # Node is required for the find-duplicate-strings tool that backs the
    # myopia:string-duplication gate.
    - name: Set up Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
      with:
        node-version: "22"

    # Deterministic install locations so the cache restores cleanly regardless
    # of pipx/npm defaults, and a key that is specific to the resolved Python
    # version (a cached venv hardcodes its interpreter path, so a Python patch
    # bump must invalidate it).
    - name: Resolve install cache key
      id: cachekey
      shell: bash
      env:
        SLOPMOP_EXTRA: ${{ inputs.install-extra }}
        SLOPMOP_VERSION: ${{ inputs.slopmop-version }}
      run: |
        pyver="$(python -c 'import platform; print(platform.python_version())')"
        # Hash of the interpreter's absolute path: a cached pipx venv hardcodes
        # sys.executable, so if the toolcache path moves (different arch, image,
        # or self-hosted runner) the key must change or the restored shebangs
        # point at a missing interpreter.
        pyhash="$(python -c 'import sys,hashlib; print(hashlib.sha256(sys.executable.encode()).hexdigest()[:12])')"
        {
          echo "pipx_home=${HOME}/.slopmop/pipx"
          echo "pipx_bin=${HOME}/.slopmop/bin"
          echo "npm_prefix=${HOME}/.slopmop/npm"
          echo "key=slopmop-install-${RUNNER_OS}-${RUNNER_ARCH}-py${pyver}-${pyhash}-x_${SLOPMOP_EXTRA:-none}-v_${SLOPMOP_VERSION:-latest}-n1"
        } >> "$GITHUB_OUTPUT"

    # restore/save are split (not the combined cache action) so the install is
    # saved right after it succeeds — the combined action only saves in its post
    # step on job success, so a failing gate verdict would never cache the tools.
    - name: Restore Slop-Mop install cache
      id: cache
      uses: actions/cache/restore@0400d5f644dc74513175e3cd8d07132dd4860809  # v4.2.4
      with:
        path: |
          ${{ steps.cachekey.outputs.pipx_home }}
          ${{ steps.cachekey.outputs.pipx_bin }}
          ${{ steps.cachekey.outputs.npm_prefix }}
        key: ${{ steps.cachekey.outputs.key }}

    # Only runs on a cache miss. With an unpinned slopmop-version the key stays
    # constant, so the cache holds whatever was latest when first built — pin
    # slopmop-version (e.g. ==2.6.0) for predictable, refresh-on-bump behaviour.
    - name: Install Slop-Mop and gate tools
      if: steps.cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        SLOPMOP_EXTRA: ${{ inputs.install-extra }}
        SLOPMOP_VERSION: ${{ inputs.slopmop-version }}
        PIPX_HOME: ${{ steps.cachekey.outputs.pipx_home }}
        PIPX_BIN_DIR: ${{ steps.cachekey.outputs.pipx_bin }}
        NPM_PREFIX: ${{ steps.cachekey.outputs.npm_prefix }}
      run: |
        python -m pip install --upgrade pip pipx
        if [[ -n "$SLOPMOP_EXTRA" ]]; then
          package="slopmop[${SLOPMOP_EXTRA}]${SLOPMOP_VERSION}"
        else
          package="slopmop${SLOPMOP_VERSION}"
        fi
        # --include-deps exposes dependency console scripts (flake8, black,
        # vulture, radon, …) so the gates that shell out to them actually run
        # instead of warning/failing on a missing tool.
        python -m pipx install --include-deps "$package"
        # Node-based tool for the string-duplication gate. --prefix (not
        # `npm config set`) keeps the install local and avoids mutating the
        # runner's npm config; the version is pinned for a deterministic cache.
        npm install --global --prefix "$NPM_PREFIX" find-duplicate-strings@3.1.1

    - name: Save Slop-Mop install cache
      if: steps.cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@0400d5f644dc74513175e3cd8d07132dd4860809  # v4.2.4
      with:
        path: |
          ${{ steps.cachekey.outputs.pipx_home }}
          ${{ steps.cachekey.outputs.pipx_bin }}
          ${{ steps.cachekey.outputs.npm_prefix }}
        key: ${{ steps.cachekey.outputs.key }}

    # PATH must be set on every run (cache hit or miss) so the tools resolve.
    - name: Add Slop-Mop tools to PATH
      shell: bash
      run: |
        echo "${{ steps.cachekey.outputs.pipx_bin }}" >> "$GITHUB_PATH"
        echo "${{ steps.cachekey.outputs.npm_prefix }}/bin" >> "$GITHUB_PATH"

    - name: Run Slop-Mop
      id: run
      shell: bash
      env:
        SLOPMOP_COMMAND: ${{ inputs.command }}
        SLOPMOP_ARGS: ${{ inputs.args }}
        SLOPMOP_RESULTS_FILE: ${{ inputs.results-file }}
        SLOPMOP_SARIF_FILE: ${{ inputs.sarif-file }}
        SLOPMOP_MINIMUM_GRADE: ${{ inputs.minimum-grade }}
      run: bash "$GITHUB_ACTION_PATH/scripts/run-slopmop.sh"

    - name: Upload SARIF
      if: ${{ always() && inputs.upload-sarif == 'true' && steps.run.outputs.sarif_exists == 'true' }}
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e  # v4.36.2
      continue-on-error: ${{ inputs.strict-sarif-upload != 'true' }}
      with:
        sarif_file: ${{ steps.run.outputs.sarif_file }}
        category: ${{ inputs.sarif-category }}

    - name: Enforce Slop-Mop verdict
      if: ${{ always() }}
      shell: bash
      env:
        SLOPMOP_EXIT_CODE: ${{ steps.run.outputs.exit_code }}
        SLOPMOP_FAIL_ON_FAILURE: ${{ inputs.fail-on-failure }}
        SLOPMOP_GRADE: ${{ steps.run.outputs.grade }}
        SLOPMOP_GRADE_MET: ${{ steps.run.outputs.grade_met }}
        SLOPMOP_MINIMUM_GRADE: ${{ inputs.minimum-grade }}
      run: |
        exit_code="${SLOPMOP_EXIT_CODE:-1}"
        if [[ "$SLOPMOP_FAIL_ON_FAILURE" == "true" && "$exit_code" != "0" ]]; then
          echo "::error::Slop-Mop failed with exit code ${exit_code}."
          exit "$exit_code"
        fi
        if [[ "$SLOPMOP_GRADE_MET" == "false" ]]; then
          echo "::error::Hull grade ${SLOPMOP_GRADE} is below the configured minimum (${SLOPMOP_MINIMUM_GRADE})."
          exit 1
        fi
